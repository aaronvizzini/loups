name: Sync GeoJSON directly to CalTopo Map

on:
  schedule:
    - cron: '0 16 * * *' 
  workflow_dispatch: 

jobs:
  sync_map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright & Dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Dynamic Sync Script
        env:
          CALTOPO_MAP_ID: ${{ secrets.CALTOPO_MAP_ID }}
          CALTOPO_SESSION: ${{ secrets.CALTOPO_SESSION }}
        run: |
          python -c "
          import os
          import time
          import requests
          from playwright.sync_api import sync_playwright

          map_id = os.environ.get('CALTOPO_MAP_ID')
          session_cookie = os.environ.get('CALTOPO_SESSION')

          print('Fetching latest tracking coordinates...')
          res = requests.get('https://storage.googleapis.com/cdfw-wolf-tracker/wolf_bins.geojson')
          if res.status_code != 200:
              print(f'Failed to fetch source data. HTTP: {res.status_code}')
              exit(1)
              
          with open('latest_data.geojson', 'w') as f:
              f.write(res.text)
          print('Data saved locally.')

          print('Launching headless sync worker...')
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              
              # FORCE A LARGE DESKTOP VIEWPORT TO ENSURE 'IMPORT' IS VISIBLE
              context = browser.new_context(viewport={'width': 1920, 'height': 1080})
              
              context.add_cookies([{
                  'name': 'session',
                  'value': session_cookie,
                  'domain': '.caltopo.com',
                  'path': '/'
              }])
              
              page = context.new_page()
              map_url = f'https://caltopo.com/m/{map_id}'
              print(f'Opening CalTopo map workspace: {map_url}')
              
              page.goto(map_url, wait_until='networkidle')
              
              print('Opening native file pipeline...')
              # Look specifically for CalTopo's top bar buttons
              # This will check for 'Import' links inside the map workspace header
              try:
                  page.wait_for_selector('a:has-text(\"Import\")', timeout=15000)
                  page.click('a:has-text(\"Import\")')
              except Exception:
                  # Fallback broad selector if wrapped in a generic layout container
                  page.click('text=Import')
                  
              page.wait_for_selector('input[type=\"file\"]')
              
              print('Uploading geometry payload...')
              page.set_input_files('input[type=\"file\"]', 'latest_data.geojson')
              
              print('Processing geometry structures...')
              time.sleep(3) 
              
              # Finalize dialog click
              page.click('button:has-text(\"Import\")')
              print('Sync finalize requested.')
              
              time.sleep(5)
              print('Direct-to-map integration successful!')
              browser.close()
          "
