name: Sync GeoJSON directly to CalTopo Map

on:
  schedule:
    - cron: '0 16 * * *' # Runs automatically every day at 12:00 PM UTC
  workflow_dispatch: # Allows you to manually trigger it anytime

jobs:
  sync_map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright & Dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Dynamic Sync Script
        env:
          CALTOPO_MAP_ID: ${{ secrets.CALTOPO_MAP_ID }}
          CALTOPO_SESSION: ${{ secrets.CALTOPO_SESSION }}
        run: |
          python -c "
          import os
          import time
          import requests
          from playwright.sync_api import sync_playwright

          map_id = os.environ.get('CALTOPO_MAP_ID')
          session_cookie = os.environ.get('CALTOPO_SESSION')

          if not map_id or not session_cookie:
              print('CRITICAL ERROR: Missing GitHub Secrets for CALTOPO_MAP_ID or CALTOPO_SESSION!')
              exit(1)

          # Step 1: Download the live tracking source GeoJSON locally
          print('Fetching latest tracking coordinates...')
          res = requests.get('https://storage.googleapis.com/cdfw-wolf-tracker/wolf_bins.geojson')
          if res.status_code != 200:
              print(f'Failed to fetch source data. HTTP: {res.status_code}')
              exit(1)
              
          with open('latest_data.geojson', 'w') as f:
              f.write(res.text)
          print('Data saved locally.')

          # Step 2: Use headless browser to inject data cleanly into the UI
          print('Launching headless sync worker...')
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              
              # Set up a browser context and pass CalTopo your authentication cookie
              context = browser.new_context()
              context.add_cookies([{
                  'name': 'session',
                  'value': session_cookie,
                  'domain': 'caltopo.com',
                  'path': '/'
              }])
              
              page = context.new_page()
              
              # Navigate directly to your specific map
              map_url = f'https://caltopo.com/m/{map_id}'
              print(f'Opening CalTopo map workspace: {map_url}')
              page.goto(map_url)
              page.wait_for_load_state('networkidle')
              
              # Locate and click CalTopo's real internal data handling components
              print('Opening native file pipeline...')
              page.click('text=Import')
              page.wait_for_selector('input[type=\"file\"]')
              
              # Upload the local geojson directly into CalTopo's importer
              print('Uploading geometry payload...')
              page.set_input_files('input[type=\"file\"]', 'latest_data.geojson')
              
              # CalTopo processes the file and renders an internal dialog. Click 'Import' inside it.
              print('Processing geometry structures...')
              time.sleep(2) # Brief rest period allowing CalTopo's parsing canvas to stabilize
              
              # Click the structural finalization button inside CalTopo's window dialog
              page.click('button:has-text(\"Import\")')
              print('Sync finalize requested.')
              
              # Wait briefly for server catalog update confirmation
              time.sleep(4)
              
              print('Direct-to-map integration successful! Fresh tracking boundaries have been pushed.')
              browser.close()
          "
