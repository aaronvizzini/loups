name: Mirror Wolf Tracking Data

on:
  schedule:
    - cron: '0 16 * * *' # Runs daily at 12:00 PM UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  mirror_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Latest GeoJSON
        run: |
          curl -s "https://storage.googleapis.com/cdfw-wolf-tracker/wolf_bins.geojson" -o wolf_tracker.geojson

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wolf_tracker.geojson
          git diff-index --quiet HEAD || git commit -m "Automated update of wolf tracking data"
          git push
