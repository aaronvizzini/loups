name: Sync GeoJSON directly to CalTopo Map

on:
  schedule:
    - cron: '0 16 * * *' # Runs automatically every day at 12:00 PM UTC
  workflow_dispatch: # Allows you to manually trigger it anytime

jobs:
  sync_map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright & Dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Dynamic Sync Script
        env:
          CALTOPO_MAP_ID: ${{ secrets.CALTOPO_MAP_ID }}
          CALTOPO_SESSION: ${{ secrets.CALTOPO_SESSION }}
        run: |
          python -c "
          import os
          import time
          import requests
          from playwright.sync_api import sync_playwright

          map_id = os.environ.get('CALTOPO_MAP_ID')
          session_cookie = os.environ.get('CALTOPO_SESSION')

          if not map_id or not session_cookie:
              print('CRITICAL ERROR: Missing GitHub Secrets!')
              exit(1)

          print('Fetching latest tracking coordinates...')
          res = requests.get('https://storage.googleapis.com/cdfw-wolf-tracker/wolf_bins.geojson')
          if res.status_code != 200:
              print(f'Failed to fetch source data. HTTP: {res.status_code}')
              exit(1)
              
          with open('latest_data.geojson', 'w') as f:
              f.write(res.text)
          print('Data saved locally.')

          print('Launching headless sync worker...')
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context()
              
              # Set the session cookie explicitly for the CalTopo domain
              context.add_cookies([{
                  'name': 'session',
                  'value': session_cookie,
                  'domain': '.caltopo.com',  # Added leading dot for subdomains
                  'path': '/'
              }])
              
              page = context.new_page()
              map_url = f'https://caltopo.com/m/{map_id}'
              print(f'Opening CalTopo map workspace: {map_url}')
              
              page.goto(map_url, wait_until='networkidle')
              
              # Debugging check: Confirm we actually loaded the map and not the login wall
              page_title = page.title()
              print(f'Loaded Page Title: \"{page_title}\"')
              if 'Sign In' in page_title or 'Login' in page_title:
                  print('CRITICAL: CalTopo rejected your CALTOPO_SESSION cookie. Update your GitHub Secret with a fresh cookie value.')
                  browser.close()
                  exit(1)
              
              print('Opening native file pipeline...')
              # Use CalTopo's top left menu click behavior explicitly
              # Try top-bar link or side-panel trigger
              try:
                  page.wait_for_selector('.ui-btn:has-text(\"Import\")', timeout=10000)
                  page.click('.ui-btn:has-text(\"Import\")')
              except Exception:
                  # Fallback selector if CalTopo structures it inside a menu dropdown
                  page.click('text=Import')
                  
              page.wait_for_selector('input[type=\"file\"]')
              
              print('Uploading geometry payload...')
              page.set_input_files('input[type=\"file\"]', 'latest_data.geojson')
              
              print('Processing geometry structures...')
              time.sleep(3) 
              
              # Finalize dialog click
              page.click('button:has-text(\"Import\")')
              print('Sync finalize requested.')
              
              time.sleep(5)
              print('Direct-to-map integration successful!')
              browser.close()
          "
