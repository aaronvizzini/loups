name: Sync GeoJSON directly to CalTopo Map

on:
  schedule:
    - cron: '0 16 * * *' # Runs automatically every day at 12:00 PM UTC
  workflow_dispatch: # Allows you to manually trigger it anytime

jobs:
  sync_map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Direct API Sync
        env:
          CALTOPO_MAP_ID: ${{ secrets.CALTOPO_MAP_ID }}
          CALTOPO_SESSION: ${{ secrets.CALTOPO_SESSION }}
        run: |
          python -c "
          import os
          import requests

          map_id = os.environ.get('CALTOPO_MAP_ID')
          session_cookie = os.environ.get('CALTOPO_SESSION')

          if not map_id or not session_cookie:
              print('CRITICAL ERROR: Missing GitHub Secrets!')
              exit(1)

          # 1. Fetch the live tracker GeoJSON data
          print('Fetching latest tracking coordinates...')
          res = requests.get('https://storage.googleapis.com/cdfw-wolf-tracker/wolf_bins.geojson')
          if res.status_code != 200:
              print(f'Failed to fetch source data. HTTP: {res.status_code}')
              exit(1)
              
          geojson_data = res.json()
          print('Data successfully downloaded from source.')

          # 2. Transmit payload directly to CalTopo's map data import handler
          print(f'Pushing payload directly to CalTopo Map backend: {map_id}')
          
          url = f'https://caltopo.com/api/v1/map/{map_id}/import'
          
          headers = {
              'Cookie': f'session={session_cookie}',
              'Content-Type': 'application/json'
          }

          response = requests.post(url, json=geojson_data, headers=headers)

          if response.status_code == 200:
              print('Direct API sync complete! Fresh geometry pushed successfully.')
          else:
              print(f'Sync Failed. HTTP Status: {response.status_code}')
              print(f'Response Body: {response.text}')
              exit(1)
          "
