name: Sync GeoJSON directly to CalTopo Map

on:
  schedule:
    - cron: '0 16 * * *' # Runs automatically every day at 12:00 PM UTC
  workflow_dispatch: # Allows you to manually trigger it anytime

jobs:
  sync_map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright & Dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Drag and Drop Sync Script
        env:
          CALTOPO_MAP_ID: ${{ secrets.CALTOPO_MAP_ID }}
          CALTOPO_SESSION: ${{ secrets.CALTOPO_SESSION }}
        run: |
          python -c "
          import os
          import time
          import requests
          from playwright.sync_api import sync_playwright

          map_id = os.environ.get('CALTOPO_MAP_ID')
          session_cookie = os.environ.get('CALTOPO_SESSION')

          if not map_id or not session_cookie:
              print('CRITICAL ERROR: Missing GitHub Secrets!')
              exit(1)

          # 1. Fetch the tracking data source
          print('Fetching latest tracking coordinates...')
          res = requests.get('https://storage.googleapis.com/cdfw-wolf-tracker/wolf_bins.geojson')
          if res.status_code != 200:
              print(f'Failed to fetch source data. HTTP: {res.status_code}')
              exit(1)
              
          with open('latest_data.geojson', 'w') as f:
              f.write(res.text)
          print('Data saved locally.')

          # 2. Open CalTopo and use UI drop injection
          print('Launching headless sync worker...')
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(viewport={'width': 1920, 'height': 1080})
              
              context.add_cookies([{
                  'name': 'session',
                  'value': session_cookie,
                  'domain': '.caltopo.com',
                  'path': '/'
              }])
              
              page = context.new_page()
              map_url = f'https://caltopo.com/m/{map_id}'
              print(f'Opening CalTopo map workspace: {map_url}')
              page.goto(map_url, wait_until='networkidle')
              
              # Wait for the map element container to load
              page.wait_for_selector('.ol-viewport, #map, .map-container', timeout=15000)
              print('Map canvas found. Injecting payload file via virtual drag-and-drop...')
              
              # Programmatically simulate dragging and dropping the file onto the active map canvas
              # This triggers CalTopo's internal catch-all file handler bypass
              page.set_input_files('body', 'latest_data.geojson')
              
              # Wait for CalTopo's confirmation modal overlay to appear
              print('Waiting for import configuration wizard...')
              page.wait_for_selector('button:has-text(\"Import\")', timeout=15000)
              
              # Click the structural finalization button inside CalTopo's confirmation window
              print('Finalizing synchronization step...')
              page.click('button:has-text(\"Import\")')
              
              # Let the server process the write request 
              time.sleep(5)
              
              print('Direct-to-map integration successful! Data updated.')
              browser.close()
          "
